<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pynkaro — assistente de voz com IA</title>
  <meta name="description" content="Pynkaro é um assistente de voz com IA para macOS: wake word, transcrição local, Claude com busca na web e um fennec animado na tela.">

  <!-- Open Graph -->
  <meta property="og:title" content="Pynkaro — assistente de voz com IA">
  <meta property="og:description" content="Um fennec espacial que ouve, pensa e responde. Assistente de voz local para macOS, com Claude e ElevenLabs.">
  <meta property="og:image" content="https://pynkaro.com/assets/pynkaro.png">
  <meta property="og:url" content="https://pynkaro.com">
  <meta property="og:type" content="website">

  <link rel="icon" type="image/png" href="assets/pynkaro.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0b1026;
      --bg-2: #101b3f;
      --cyan: #35c6e8;
      --cyan-soft: rgba(53, 198, 232, 0.35);
      --cream: #f6ead8;
      --text: #e8ecf7;
      --text-dim: #9aa5c4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(ellipse at 50% -20%, var(--bg-2) 0%, var(--bg-1) 60%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      overflow-x: hidden;
    }

    /* Estrelinhas sutis no fundo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 70% 15%, rgba(255,255,255,.4) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 85% 60%, rgba(53,198,232,.6) 50%, transparent 51%),
        radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.35) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 10% 70%, rgba(53,198,232,.5) 50%, transparent 51%),
        radial-gradient(1px 1px at 60% 45%, rgba(255,255,255,.3) 50%, transparent 51%);
      pointer-events: none;
    }

    .avatar-wrap {
      position: relative;
      margin-bottom: 8px;
    }

    /* Halo ciano atrás do fennec */
    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -10%;
      background: radial-gradient(circle, var(--cyan-soft) 0%, transparent 65%);
      z-index: 0;
    }

    .avatar {
      position: relative;
      z-index: 1;
      width: min(320px, 70vw);
      height: auto;
      animation: float 5s ease-in-out infinite;
      filter: drop-shadow(0 12px 32px rgba(53, 198, 232, 0.25));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    h1 {
      font-size: clamp(3rem, 9vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, var(--cream) 30%, var(--cyan) 120%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .tagline {
      margin-top: 12px;
      max-width: 34rem;
      font-size: clamp(1.05rem, 2.5vw, 1.3rem);
      color: var(--text-dim);
      line-height: 1.55;
    }

    .tagline strong { color: var(--text); }

    .links {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .btn svg { width: 22px; height: 22px; flex: none; }

    .btn-youtube {
      background: linear-gradient(180deg, #ff4b4b, #d92626);
      color: #fff;
      box-shadow: 0 6px 24px rgba(217, 38, 38, 0.35);
    }

    .btn-github {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(53, 198, 232, 0.3);
    }

    footer {
      margin-top: 64px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    footer a { color: var(--cyan); text-decoration: none; }

    @media (prefers-reduced-motion: reduce) {
      .avatar { animation: none; }
    }
  </style>
</head>
<body>

  <div class="avatar-wrap">
    <img class="avatar" src="assets/pynkaro.png" alt="Pynkaro, um fennec espacial com olhos ciano brilhantes e traje futurista">
  </div>

  <h1>Pynkaro das Galáxias</h1>

  <p class="tagline">
    Uma raposa libertária espacial que <strong>ouve</strong>, <strong>pensa</strong> e <strong>responde</strong>.<br>
    Assistente de voz com IA comentarista de notícias nas horas vagas.
  </p>

  <nav class="links">
    <a class="btn btn-youtube" href="https://www.youtube.com/@ancap_su" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.3 31.3 0 0 0 0 12a31.3 31.3 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.3 31.3 0 0 0 24 12a31.3 31.3 0 0 0-.5-5.8zM9.6 15.6V8.4L15.8 12l-6.2 3.6z"/>
      </svg>
      Veja o Pynkaro no YouTube
    </a>
    <a class="btn btn-github" href="https://github.com/ralbuque/pynkaro" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 .5A11.5 11.5 0 0 0 .5 12a11.5 11.5 0 0 0 7.9 10.9c.6.1.8-.2.8-.6v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.7 0-1.3.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.2 1.2a11 11 0 0 1 5.8 0C19.3 4.9 20.3 5.2 20.3 5.2c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.4-2.7 5.4-5.3 5.7.4.4.8 1.1.8 2.2v3.2c0 .4.2.7.8.6A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5z"/>
      </svg>
      Código no GitHub
    </a>
  </nav>

  <footer>
    <a href="https://pynkaro.com">pynkaro.com</a> — feito com IA, café e orelhas grandes.
  </footer>

</body>
</html>
